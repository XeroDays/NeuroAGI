<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'">
  <title>NeuroAGI</title>
  <link rel="stylesheet" href="styles/diagnoses-room.css">
</head>
<body class="diagnoses-chat">
  <header class="diagnoses-chat-header">
    <a class="diagnoses-chat-back" href="index.html">Back to home</a>
    <div class="diagnoses-chat-header-titles">
      <h1 id="app-title" class="diagnoses-chat-brand"></h1>
      <span id="screen-title" class="diagnoses-chat-screen"></span>
    </div>
  </header>
  <main class="diagnoses-chat-main">
    <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
    <div class="chat-composer-wrap">
      <div class="chat-composer">
        <textarea id="chat-input" class="chat-input" rows="1" placeholder="Message…" aria-label="Message"></textarea>
        <button type="button" id="chat-send" class="chat-send" aria-label="Send">Send</button>
      </div>
    </div>
  </main>
  <script type="module" src="scripts/diagnoses-room.js"></script>
</body>
</html>
